name: App Submission
description: Submit a new app, platform, or funding tool to the directory
title: "[App] Your app name here"
labels: ["content", "app"]
body:
  - type: textarea
    id: slug
    attributes:
      label: Slug
      description: "Optional — leave blank to auto-generate from title. Use the existing slug when updating content."
      placeholder: "gitcoin-grants-stack"
      value: |
        <!--
        IMPORTANT: If editing this issue as raw markdown, do not rename or remove section headers (### Name).
        They are used as parsing keys by the publishing automation — changing them will break content generation.
        -->
    validations:
      required: false

  - type: input
    id: short-description
    attributes:
      label: Short Description
      description: "One-line summary shown in cards and search"
      placeholder: "A decentralized grants platform for public goods funding"
    validations:
      required: true

  - type: textarea
    id: tags
    attributes:
      label: Tags
      description: "Comma-separated tags"
      value: |
        <!-- Comma-separated tags, e.g: grants, ethereum, quadratic -->
    validations:
      required: true

  - type: checkboxes
    id: featured
    attributes:
      label: Featured
      description: "Team only — leave unchecked. Gitcoin team sets this during publishing."
      options:
        - label: Feature this app on the homepage

  - type: textarea
    id: banner-image
    attributes:
      label: Banner Image
      description: |
        Open https://gitcoin.co/generator in a new tab (cmd+click / ctrl+click).
        Press R to cycle through patterns until you find one you like → press S to save → drag the saved PNG here.
        Only images from the Chladni generator are accepted (no screenshots or external images).
      value: |
        <!-- Go to https://gitcoin.co/generator → press R to cycle patterns → press S to save → drag the PNG here. Only Chladni-generated PNGs accepted. -->
    validations:
      required: true

  - type: textarea
    id: logo
    attributes:
      label: Logo
      description: |
        Drag your logo PNG into this text area (GitHub will upload it automatically).
        Use the white/inverted version — logos are displayed on dark backgrounds.
        Square format, 256×256 or 512×512 px, PNG only.
      value: |
        <!-- Drag your white/inverted logo PNG here. Square format (256×256 or 512×512 px), PNG only, displayed on dark backgrounds. -->
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Full description. Markdown is supported."
      value: |
        <!--
        Full description of the app. Markdown is supported.

        Suggested details to include:
        - **Category**: Platform | DAO | Grant Program | Fund | Primitive
        - **Status**: Active | Deprecated | Upcoming
        - **Website**: https://...
        - **Blockchains**: Ethereum, Optimism, etc.
        - **Funding Volume**: e.g., $10M distributed
        - **Social Links**: Twitter, Discord, GitHub

        Delete this comment and write your description below.
        -->
    validations:
      required: true

  - type: textarea
    id: related-apps
    attributes:
      label: Related Apps
      description: "Comma-separated slugs (e.g. gitcoin-grants-stack, octant)"
      value: |
        <!-- Comma-separated slugs, e.g: gitcoin-grants-stack, octant -->
    validations:
      required: false

  - type: textarea
    id: related-mechanisms
    attributes:
      label: Related Mechanisms
      description: "Comma-separated slugs (e.g. quadratic-funding, direct-grants)"
      value: |
        <!-- Comma-separated slugs, e.g: quadratic-funding, direct-grants -->
    validations:
      required: false

  - type: textarea
    id: related-case-studies
    attributes:
      label: Related Case Studies
      description: "Comma-separated slugs"
      value: |
        <!-- Comma-separated slugs, e.g: gitcoin-gr15-case-study -->
    validations:
      required: false

  - type: textarea
    id: related-research
    attributes:
      label: Related Research
      description: "Comma-separated slugs"
      value: |
        <!-- Comma-separated slugs, e.g: my-research-slug -->
    validations:
      required: false

  - type: textarea
    id: related-campaigns
    attributes:
      label: Related Campaigns
      description: "Comma-separated slugs"
      value: |
        <!-- Comma-separated slugs, e.g: gg24, gg25 -->
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      options:
        - label: My short description is accurate and fits in one line
          required: true
        - label: My description is complete and written in Markdown
          required: true
        - label: Logo is the **white/inverted version** in PNG format (not full-colour — it appears on a dark background)
          required: true
