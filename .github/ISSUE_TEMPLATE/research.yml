name: Research Submission
description: Submit a research article or report to the directory
title: "[Research] Your research title here"
labels: ["content", "research"]
body:
  - type: input
    id: slug
    attributes:
      label: Slug
      description: "Optional — leave blank to auto-generate from title. Use the existing slug when updating content."
      placeholder: "quadratic-funding-analysis-2024"
    validations:
      required: false

  - type: input
    id: short-description
    attributes:
      label: Short Description
      description: "One-line summary shown in cards and search"
      placeholder: "An analysis of quadratic funding outcomes across 10 grant rounds"
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: "Comma-separated tags"
      placeholder: "quadratic, analysis, public-goods"
    validations:
      required: true

  - type: dropdown
    id: research-type
    attributes:
      label: Research Type
      description: "Optional — categorize the type of research"
      options:
        - Book
        - Report
        - Opinion
        - Analysis
        - Perspective
    validations:
      required: false

  - type: dropdown
    id: sensemaking-for
    attributes:
      label: Sensemaking For
      description: "Team only — leave blank. Gitcoin team sets this during publishing."
      options:
        - mechanisms
        - apps
        - campaigns
        - case-studies
        - research
    validations:
      required: false

  - type: checkboxes
    id: featured
    attributes:
      label: Featured
      description: "Team only — leave unchecked. Gitcoin team sets this during publishing."
      options:
        - label: Feature this research on the homepage

  - type: input
    id: cta-url
    attributes:
      label: CTA URL
      description: "Optional — external link for the CTA button (e.g. https://example.com/report). For PDFs, use the PDF field below instead."
      placeholder: "https://example.com/report"
    validations:
      required: false

  - type: textarea
    id: banner-image
    attributes:
      label: Banner Image
      description: |
        Go to https://gitcoin.co/generator → set Aspect to Landscape → press R to pick a pattern → press S to save → drag the PNG here.
        Only images from the Chladni generator are accepted (no screenshots or external images).
    validations:
      required: true

  - type: textarea
    id: pdf
    attributes:
      label: PDF
      description: "Optional — drag a PDF file here to attach it. The publish script will download it and set the CTA URL automatically."
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Full description. Markdown is supported."
      placeholder: "Describe the research, its methodology, findings, and key takeaways."
    validations:
      required: true

  - type: textarea
    id: related-apps
    attributes:
      label: Related Apps
      description: "One slug per line (e.g. gitcoin-grants-stack)"
    validations:
      required: false

  - type: textarea
    id: related-mechanisms
    attributes:
      label: Related Mechanisms
      description: "One slug per line (e.g. quadratic-funding)"
    validations:
      required: false

  - type: textarea
    id: related-case-studies
    attributes:
      label: Related Case Studies
      description: "One slug per line"
    validations:
      required: false

  - type: textarea
    id: related-research
    attributes:
      label: Related Research
      description: "One slug per line"
    validations:
      required: false

  - type: textarea
    id: related-campaigns
    attributes:
      label: Related Campaigns
      description: "One slug per line"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      options:
        - label: My short description is accurate and fits in one line
          required: true
        - label: My description is complete and written in Markdown
          required: true
        - label: If I attached a PDF, I used the PDF field above (not the CTA URL field)
          required: false
