name: Campaign Submission
description: Submit a funding round or campaign to the directory
title: "[Campaign] Your campaign name here"
labels: ["content", "campaign"]
body:
  - type: textarea
    id: slug
    attributes:
      label: Slug
      description: "Optional — leave blank to auto-generate from title. Use the existing slug when updating content."
      placeholder: "gg24"
      value: |
        <!--
        IMPORTANT: If editing this issue as raw markdown, do not rename or remove section headers (### Name).
        They are used as parsing keys by the publishing automation — changing them will break content generation.
        -->
    validations:
      required: false

  - type: input
    id: short-description
    attributes:
      label: Short Description
      description: "One-line summary shown in cards and search"
      placeholder: "Gitcoin Grants Round 24 — funding public goods with $1.5M matching"
    validations:
      required: true

  - type: textarea
    id: tags
    attributes:
      label: Tags
      description: "Comma-separated tags"
      value: |
        <!-- Comma-separated tags, e.g: grants, ethereum, quadratic -->
    validations:
      required: true

  - type: input
    id: external-url
    attributes:
      label: CTA URL
      description: "Optional — link to the campaign or round"
      placeholder: "https://grants.gitcoin.co"
    validations:
      required: false

  - type: input
    id: matching-pool-usd
    attributes:
      label: Matching Pool USD
      description: "Optional — total matching pool as a display string"
      placeholder: "$1.5M"
    validations:
      required: false

  - type: input
    id: projects-count
    attributes:
      label: Projects Count
      description: "Optional — number of projects funded"
      placeholder: "265"
    validations:
      required: false

  - type: input
    id: start-date
    attributes:
      label: Start Date
      description: "Optional — campaign start date"
      placeholder: "2024-08-07"
    validations:
      required: false

  - type: input
    id: end-date
    attributes:
      label: End Date
      description: "Optional — campaign end date. Leave blank for ongoing campaigns."
      placeholder: "2024-08-21"
    validations:
      required: false

  - type: checkboxes
    id: featured
    attributes:
      label: Featured
      description: "Team only — leave unchecked. Gitcoin team sets this during publishing."
      options:
        - label: Feature this campaign on the homepage

  - type: textarea
    id: banner-image
    attributes:
      label: Banner Image
      description: |
        Open https://gitcoin.co/generator in a new tab (cmd+click / ctrl+click).
        Press R to cycle through patterns until you find one you like → press S to save → drag the saved PNG here.
        Only images from the Chladni generator are accepted (no screenshots or external images).
      value: |
        <!-- Go to https://gitcoin.co/generator → press R to cycle patterns → press S to save → drag the PNG here. Only Chladni-generated PNGs accepted. -->
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Full description. Markdown is supported."
      value: |
        <!--
        Full description of the campaign. Markdown is supported.

        Include: goals, what was funded, participating projects, key outcomes, and impact.

        Delete this comment and write your description below.
        -->
    validations:
      required: true

  - type: textarea
    id: related-apps
    attributes:
      label: Related Apps
      description: "Comma-separated slugs (e.g. gitcoin-grants-stack, octant)"
      value: |
        <!-- Comma-separated slugs, e.g: gitcoin-grants-stack, octant -->
    validations:
      required: false

  - type: textarea
    id: related-mechanisms
    attributes:
      label: Related Mechanisms
      description: "Comma-separated slugs (e.g. quadratic-funding, direct-grants)"
      value: |
        <!-- Comma-separated slugs, e.g: quadratic-funding, direct-grants -->
    validations:
      required: false

  - type: textarea
    id: related-case-studies
    attributes:
      label: Related Case Studies
      description: "Comma-separated slugs"
      value: |
        <!-- Comma-separated slugs, e.g: gitcoin-gr15-case-study -->
    validations:
      required: false

  - type: textarea
    id: related-research
    attributes:
      label: Related Research
      description: "Comma-separated slugs"
      value: |
        <!-- Comma-separated slugs, e.g: my-research-slug -->
    validations:
      required: false

  - type: textarea
    id: related-campaigns
    attributes:
      label: Related Campaigns
      description: "Comma-separated slugs"
      value: |
        <!-- Comma-separated slugs, e.g: gg24, gg25 -->
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      options:
        - label: My short description is accurate and fits in one line
          required: true
        - label: My description is complete and written in Markdown
          required: true
        - label: Start/end dates are in YYYY-MM-DD format (or left blank if ongoing)
          required: false
